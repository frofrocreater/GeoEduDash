<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoEduDash - Mathematics in Motion</title>
    <style>
        :root {
            --bg-color: #0a0a1a;
            --grid-color: rgba(0, 242, 254, 0.1);
            --player-color: #00f2fe;
            --hazard-color: #ff4b2b;
            --ground-color: #0f172a;
            --accent-color: #4facfe;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            color: white;
            user-select: none;
            /* Ensures the cursor looks like a pointer when over the game */
            cursor: default;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #1a1a2e, #0f172a);
            cursor: pointer; /* Visual cue for computer users that they can click to jump */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .menu-container {
            pointer-events: auto;
            text-align: center;
            z-index: 10;
        }

        h1.main-title {
